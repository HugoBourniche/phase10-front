<div class="container">
  <div class="title moving-colors m-2">Les 10 étapes</div>
  <app-menu [(selectedMenu)]="selectedMenu"></app-menu>
  <ng-container *ngIf="selectedMenu == 0">
    <app-phases></app-phases>
  </ng-container>
  <ng-container *ngIf="selectedMenu == 1">
    <app-phases [seed]="'default'"></app-phases>
  </ng-container>
  <ng-container *ngIf="selectedMenu == 2">
    <app-phases [seed]="''"></app-phases>
  </ng-container>
</div>
